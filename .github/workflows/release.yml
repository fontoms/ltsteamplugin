name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ltsteamplugin.zip
        run: |
          git archive --format=zip --prefix=ltsteamplugin/ HEAD \
            $(git ls-files | grep -vE "^(scripts/|\.gitignore|backend/locales/fill_locales\.py|scripts/validate_locales\.py)") \
            -o ltsteamplugin.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ltsteamplugin.zip
